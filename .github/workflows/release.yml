name: release

# push tag vX.Y.Z 触发：打包 macOS App + CLI（Universal arm64+x86_64），创建 GitHub Release。
# runner 必须为 macos-26：项目用 .defaultIsolation(Swift 6.2)，仅 Xcode 26+ 可编译；
# macos-15 仅带 Xcode 16.x。runner 本身 arm64，通过 Rust 双 target + lipo + xcodebuild ARCHS
# 在同一 runner 上交叉编译 x86_64 slice（Xcode SDK 自带 x86 支持）。
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # gh release create 需要

jobs:
  build-release:
    runs-on: macos-26
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v5

      - name: 校验 tag 与 VERSION 一致
        run: |
          want="v$(tr -d ' \t\n\r' < VERSION)"
          [ "$GITHUB_REF_NAME" = "$want" ] || { echo "tag $GITHUB_REF_NAME != VERSION $want，先对齐再发" >&2; exit 1; }

      - name: 选最新 Xcode + 校验 Swift ≥ 6.2
        run: |
          sudo xcode-select -s "$(printf '%s\n' /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          swift --version
          sw="$(swift -version 2>&1 | sed -n 's/.*Swift version \([0-9]*\.[0-9]*\).*/\1/p' | head -1)"
          if [ "$(printf '%s\n6.2\n' "$sw" | sort -V | head -1)" != "6.2" ]; then
            echo "需要 Swift ≥ 6.2，实际 $sw（runner 镜像回退？换更新的 macos-* label）" >&2; exit 1
          fi

      - name: 准备 Rust stable（edition 2024 需 ≥ 1.85；universal target 由 package.sh 自动 add）
        run: |
          rustup update stable
          rustup default stable
          rustc --version

      - name: 打包 .app（Release universal arm64+x86_64，内嵌同版本 CLI）
        run: ./jj-bookmark-app/package.sh universal

      - name: ad-hoc 签名（无 Developer 证书；封装 bundle）
        run: |
          app="jj-bookmark-app/build/jj-bookmark.app"
          codesign --force --sign - "$app/Contents/Helpers/jj-bookmark"
          codesign --force --deep --sign - "$app"
          codesign --verify "$app"

      - name: 组装发布产物（universal）
        run: |
          mkdir -p dist
          app="jj-bookmark-app/build/jj-bookmark.app"
          ditto -c -k --keepParent "$app" "dist/jj-bookmark-macos-universal.zip"      # 保 bundle 结构/签名
          cp "$app/Contents/Helpers/jj-bookmark" "dist/jj-bookmark-cli-macos-universal" # bundle 内已 lipo 合并 arm64+x86_64
          ( cd dist && shasum -a 256 jj-bookmark-macos-universal.zip jj-bookmark-cli-macos-universal > SHA256SUMS.txt )

      - name: 生成 Release notes（CHANGELOG 本版段 + 安装说明 footer）
        run: |
          ver="${GITHUB_REF_NAME#v}"
          awk -v v="$ver" '
            $0 ~ "^## \\[" v "\\]" { p=1; next }
            p && (/^## \[/ || /^\[[^]]*\]: /) { exit }
            p { print }
          ' CHANGELOG.md > notes.md
          printf '\n' >> notes.md
          cat .github/release-notes-footer.md >> notes.md

      - name: 创建 GitHub Release
        run: |
          # 幂等：重打同 tag（见 workflow.md §4）时先删旧 release，避免 create 冲突。
          # 不带 --cleanup-tag，保留当前 git tag；首次发布该删除为 no-op。
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md \
            dist/jj-bookmark-macos-universal.zip \
            dist/jj-bookmark-cli-macos-universal \
            dist/SHA256SUMS.txt
